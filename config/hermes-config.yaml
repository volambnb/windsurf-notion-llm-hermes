model:
  default: deepseek-v4-pro
  provider: windsurf
  base_url: http://127.0.0.1:3003/v1

routing_lock:
  enabled: true
  provider: windsurf
  backend: windsurf-proxy
  model: deepseek-v4-pro
  rotate_accounts: true
  allow_backstop: false
  keep_signal_heal: true
  validate_on_start: true

providers:
  windsurf:
    name: Windsurf Pro
    base_url: http://127.0.0.1:3003/v1
    key_env: WINDSURF_API_KEY
    default_model: deepseek-v4-pro
    transport: openai_chat
    discover_models: false
    models:
      # v1.7 routing lock target
      - deepseek-v4-pro
      # Pro - Opus 4.6
      - claude-opus-4.6-thinking
      # Pro - Opus 4.7
      - claude-opus-4-7-medium
      - claude-opus-4-7-high
      - claude-opus-4-7-xhigh
      - claude-opus-4-7-max
      - claude-opus-4-7-medium-thinking
      - claude-opus-4-7-high-thinking
      - claude-opus-4-7-xhigh-thinking
      # Pro - GPT 5.4/5.4-mini/5.5
      - gpt-5.4-none
      - gpt-5.4-low
      - gpt-5.4-medium
      - gpt-5.4-high
      - gpt-5.4-xhigh
      - gpt-5.4-mini-low
      - gpt-5.4-mini-medium
      - gpt-5.4-mini-high
      - gpt-5.4-mini-xhigh
      - gpt-5.5
      - gpt-5.5-low
      - gpt-5.5-medium
      - gpt-5.5-high
      - gpt-5.5-xhigh
      # Pro - Gemini
      - gemini-2.5-pro
      - gemini-2.5-flash
      - gemini-3.0-pro
      - gemini-3.0-flash
      - gemini-3.0-flash-high
      - gemini-3.1-pro-high
      - gemini-3.1-pro-low
      # Free
      - kimi-k2-6
      - kimi-k2
      - kimi-k2-thinking
      - kimi-k2.5
      - glm-4.7
      - glm-5
      - glm-5.1
      - grok-3
      - grok-3-mini-thinking
      - grok-code-fast-1
      - minimax-m2.5
      - swe-1.6
      - swe-1.6-fast
  notion-proxy:
    name: Notion Proxy
    base_url: http://127.0.0.1:4200/v1
    key_env: NOTION_PROXY_API_KEY
    default_model: claude-sonnet4.6
    transport: openai_chat
  nvidia:
    name: NVIDIA NIM
    base_url: https://integrate.api.nvidia.com/v1
    key_env: NVIDIA_API_KEY
    default_model: meta/llama-3.3-70b-instruct
    transport: openai_chat

fallback_providers:
  - notion-proxy
  - nvidia

tier_models:
  tier1_default: deepseek-v4-pro
  tier2_cheap: gemini-3.0-flash-high
  tier4_local: notion-agent-opus
  advisor: opus-4.7

model_bootstrap:
  enabled: true
  run_on_start: true
  discovery_path: /models
  ttl_seconds: 300
  stale_seconds: 1800
  per_account_timeout_s: 8
  prefer_more_accounts: true

model_fallback:
  - windsurf
  - notion-proxy
  - nvidia
